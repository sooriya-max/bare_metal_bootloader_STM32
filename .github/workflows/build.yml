name: Build Bootloader
on:
  push:
    branches: [main]
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Install ARM toolchain
        run: sudo apt-get install -y gcc-arm-none-eabi
      - name: Build Bootloader
        run: make run
      - name: Check ELF exists
        run: test -f Bootloader.elf